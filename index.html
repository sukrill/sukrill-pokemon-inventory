<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Pokémon card inventory — browse cards available on Whatnot.">
  <title>Pokémon Card Inventory</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='15' fill='%23ffcb05' stroke='%23222' stroke-width='2'/%3E%3Cpath d='M1 16h30' stroke='%23222' stroke-width='3'/%3E%3Ccircle cx='16' cy='16' r='5' fill='%23fff' stroke='%23222' stroke-width='3'/%3E%3C/svg%3E">
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <div class="brand">
        <span class="pokeball" aria-hidden="true"></span>
        <h1>Card Inventory</h1>
      </div>
      <div class="stats" id="headline-stats">
        <div class="stat"><span class="stat-num" id="stat-count">—</span><span class="stat-lbl">Cards</span></div>
        <div class="stat"><span class="stat-num" id="stat-value">—</span><span class="stat-lbl">Total Value</span></div>
        <div class="stat"><span class="stat-num" id="stat-updated">—</span><span class="stat-lbl">Updated</span></div>
      </div>
    </div>
  </header>

  <div class="toolbar" id="toolbar">
    <div class="toolbar-inner">
      <div class="search-wrap">
        <svg class="search-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M21 21l-4.3-4.3M11 19a8 8 0 100-16 8 8 0 000 16z" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        <input type="search" id="search" placeholder="Search name, set, card # or inventory ID…" autocomplete="off">
        <button id="search-clear" class="search-clear" aria-label="Clear search" hidden>&times;</button>
      </div>
      <div class="filters">
        <select id="filter-set" aria-label="Filter by set"><option value="">All Sets</option></select>
        <select id="filter-condition" aria-label="Filter by condition"><option value="">All Conditions</option></select>
        <select id="sort" aria-label="Sort">
          <option value="newest">Newest</option>
          <option value="name-asc">Name A–Z</option>
          <option value="name-desc">Name Z–A</option>
          <option value="price-asc">Price: Low–High</option>
          <option value="price-desc">Price: High–Low</option>
          <option value="qty-desc">Quantity</option>
        </select>
        <label class="instock-toggle">
          <input type="checkbox" id="filter-instock"> In stock only
        </label>
      </div>
    </div>
    <div class="result-line"><span id="result-count">Loading…</span><button id="reset-btn" class="reset-btn" hidden>Reset filters</button></div>
  </div>

  <main class="container">
    <div id="grid" class="grid" aria-live="polite"></div>
    <div id="empty" class="empty" hidden>
      <span class="pokeball big" aria-hidden="true"></span>
      <p>No cards match your search.</p>
    </div>
    <div id="sentinel" class="sentinel"></div>
    <div id="load-more-wrap" class="load-more-wrap" hidden>
      <button id="load-more" class="load-more">Load more</button>
    </div>
  </main>

  <footer class="site-footer">
    <p>Browse-only inventory · Purchases handled on Whatnot.</p>
  </footer>

  <!-- Card modal -->
  <div id="modal" class="modal" hidden>
    <div class="modal-backdrop" data-close></div>
    <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="m-name">
      <button class="modal-close" data-close aria-label="Close">&times;</button>
      <div class="modal-body">
        <div class="modal-img-wrap">
          <img id="m-img" alt="" loading="lazy">
        </div>
        <div class="modal-info">
          <h2 id="m-name"></h2>
          <div id="m-price" class="modal-price"></div>
          <dl class="modal-dl" id="m-details"></dl>
          <div id="m-notes-wrap" class="modal-notes" hidden>
            <span class="notes-label">Notes</span>
            <p id="m-notes"></p>
          </div>
          <div class="modal-actions">
            <button id="m-copy" class="btn btn-primary">📋 Copy info</button>
            <button id="m-share" class="btn btn-ghost">🔗 Copy link</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="toast" class="toast" hidden></div>

  <script src="script.js"></script>
</body>
</html>
